<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report or Not?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f6f5f8;
            color: #413659;
            overscroll-behavior-y: contain;
        }

        /* Target Zone Scrollability */
        .zone-content {
            max-height: 250px; /* Limits height so it doesn't push the page down forever */
            overflow-y: auto;  /* Adds scrollbar if many items are dropped */
            padding-right: 4px;
            scrollbar-width: thin; /* Firefox */
            scrollbar-color: #C6B4D9 transparent;
        }

        /* Chrome/Safari Scrollbar styling */
        .zone-content::-webkit-scrollbar { width: 6px; }
        .zone-content::-webkit-scrollbar-thumb { background-color: #C6B4D9; border-radius: 10px; }

        .drop-zone {
            transition: all 0.3s ease;
            min-height: 160px;
        }

        .drop-zone.drag-over {
            background-color: #C6B4D9;
            transform: scale(1.01);
            border-style: solid;
        }

        /* Mobile Swipe Pool */
        @media (max-width: 768px) {
            #scenarios-pool {
                position: sticky;
                top: 0;
                z-index: 50;
                background: #f6f5f8;
                padding: 10px 0;
                border-bottom: 2px solid #e2e8f0;
                display: flex;
                overflow-x: auto;
                gap: 10px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }
            .scenario-card {
                flex: 0 0 85%;
                scroll-snap-align: center;
                min-width: 260px;
            }
        }

        .scenario-card {
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Selected state for mobile tap */
        .selected-card {
            ring: 3px solid #513873;
            outline: 2px solid #C6B4D9;
            transform: translateY(-3px);
        }

        /* Dropped Card Styling (Tightened) */
        .dropped-style {
            margin-bottom: 4px !important; /* Removes excess space between dropped cards */
            padding: 6px 8px !important;   /* Compact padding */
            font-size: 0.85rem !important;
            line-height: 1.2 !important;
        }

        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-4">
            <h1 class="text-2xl font-bold text-[#513873]">Report or Not?</h1>
            <p class="text-xs text-[#413659] mt-1">
                <span class="hidden md:inline">Drag scenarios into the boxes.</span>
                <span class="md:hidden">Tap a scenario, then tap a box below.</span>
            </p>
        </header>

        <div id="scenarios-pool" class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="zone-report" class="drop-zone border-4 border-dashed border-[#513873] rounded-xl p-3 flex flex-col bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="self-center bg-[#513873] text-white px-3 py-0.5 rounded-full text-[10px] font-bold mb-3 uppercase tracking-wider">Report Required</div>
                <div class="zone-content w-full flex flex-col"></div>
            </div>

            <div id="zone-no-report" class="drop-zone border-4 border-dashed border-[#9C7F9D] rounded-xl p-3 flex flex-col bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="self-center bg-[#9C7F9D] text-white px-3 py-0.5 rounded-full text-[10px] font-bold mb-3 uppercase tracking-wider">No Report Needed</div>
                <div class="zone-content w-full flex flex-col"></div>
            </div>
        </div>

        <div class="mt-6 text-center">
            <div id="feedback-message" class="text-lg font-bold mb-4 min-h-[24px]"></div>
            <button onclick="resetActivity()" class="bg-[#413659] text-white font-bold py-2 px-8 rounded-lg shadow-md active:scale-95 text-sm transition-transform">
                Reset Activity
            </button>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let selectedCard = null;

        function init() {
            const pool = document.getElementById('scenarios-pool');
            pool.innerHTML = '';
            selectedCard = null;
            [...scenarios].sort(() => Math.random() - 0.5).forEach(s => {
                const card = document.createElement('div');
                card.id = `card-${s.id}`;
                card.className = "scenario-card bg-white p-3 rounded-lg shadow border border-gray-200 text-center font-medium text-sm";
                card.draggable = true;
                card.innerText = s.text;
                card.dataset.category = s.category;
                card.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text/plain', e.target.id);
                    e.target.classList.add('opacity-40');
                });
                card.addEventListener('dragend', e => e.target.classList.remove('opacity-40'));
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (selectedCard) selectedCard.classList.remove('selected-card');
                    if (selectedCard !== card) {
                        selectedCard = card;
                        card.classList.add('selected-card');
                    } else {
                        selectedCard = null;
                    }
                });
                pool.appendChild(card);
            });
            document.querySelectorAll('.zone-content').forEach(z => z.innerHTML = '');
            document.getElementById('feedback-message').innerText = '';
        }

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('click', () => {
                if (selectedCard) {
                    processMove(selectedCard, zone.id === 'zone-report' ? 'report' : 'no-report');
                    selectedCard = null;
                }
            });
        });

        function allowDrop(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const cardId = e.dataTransfer.getData('text/plain');
            processMove(document.getElementById(cardId), e.currentTarget.id === 'zone-report' ? 'report' : 'no-report');
        }

        function processMove(card, zoneType) {
            const targetZone = document.getElementById(`zone-${zoneType}`).querySelector('.zone-content');
            card.classList.remove('selected-card', 'opacity-40');
            card.draggable = false;
            card.onclick = null;
            card.className = `scenario-card dropped-style border-2 rounded-md text-center font-bold ${card.dataset.category === zoneType ? 'correct' : 'incorrect'}`;
            targetZone.appendChild(card);
            
            // Auto-scroll to bottom of zone when new card added
            targetZone.scrollTop = targetZone.scrollHeight;
            
            showFeedback(card.dataset.category === zoneType ? "Correct!" : "Incorrect.", card.dataset.category === zoneType ? "text-green-600" : "text-red-600");
            checkCompletion();
        }

        function showFeedback(msg, color) {
            const fb = document.getElementById('feedback-message');
            fb.innerText = msg;
            fb.className = `text-lg font-bold mb-4 ${color}`;
            setTimeout(() => { if (fb.innerText === msg) fb.innerText = ''; }, 1200);
        }

        function checkCompletion() {
            if (document.getElementById('scenarios-pool').children.length === 0) {
                const mistakes = document.querySelectorAll('.incorrect').length;
                const fb = document.getElementById('feedback-message');
                fb.className = "text-xl font-bold mb-4 text-[#513873]";
                fb.innerText = mistakes === 0 ? "Perfect Score!" : `Finished! Score: ${scenarios.length - mistakes}/${scenarios.length}`;
            }
        }

        window.onload = init;
        function resetActivity() { init(); }
    </script>
</body>
</html>
