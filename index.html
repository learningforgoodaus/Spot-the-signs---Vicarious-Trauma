<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report or Not?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f6f5f8;
            color: #413659;
            /* Prevents pull-to-refresh gestures during the game */
            overscroll-behavior-y: contain;
        }

        .drop-zone {
            transition: all 0.3s ease;
            min-height: 140px;
        }

        .drop-zone.drag-over {
            background-color: #C6B4D9;
            transform: scale(1.02);
        }

        /* Mobile specific layout for the pool */
        @media (max-width: 768px) {
            #scenarios-pool {
                position: sticky;
                top: 0;
                z-index: 50;
                background: #f6f5f8;
                padding: 10px 0;
                border-bottom: 2px solid #ddd;
                margin-bottom: 1.5rem;
                display: flex;
                overflow-x: auto;
                gap: 12px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }
            
            .scenario-card {
                flex: 0 0 85%;
                scroll-snap-align: center;
                min-width: 250px;
            }
        }

        .scenario-card {
            cursor: grab;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            user-select: none;
            -webkit-user-select: none;
        }

        /* The 'Selected' state for mobile tapping */
        .selected-card {
            ring: 4px solid #513873;
            outline: 3px solid #C6B4D9;
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
        }

        .incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-[#513873] mb-1">Report or Not?</h1>
            <p class="text-sm text-[#413659] italic">
                <span class="hidden md:inline">Drag scenarios into the boxes.</span>
                <span class="md:hidden">Tap a card, then tap the correct box.</span>
            </p>
        </header>

        <div id="scenarios-pool" class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6">
            </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="zone-report" class="drop-zone border-4 border-dashed border-[#513873] rounded-xl p-4 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="bg-[#513873] text-white px-3 py-1 rounded-full text-xs font-bold mb-3 uppercase tracking-wider">Report Required</div>
                <div class="zone-content w-full flex flex-col gap-2"></div>
            </div>

            <div id="zone-no-report" class="drop-zone border-4 border-dashed border-[#9C7F9D] rounded-xl p-4 flex flex-col items-center bg-white shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)" ondragleave="dragLeave(event)">
                <div class="bg-[#9C7F9D] text-white px-3 py-1 rounded-full text-xs font-bold mb-3 uppercase tracking-wider">No Report Needed</div>
                <div class="zone-content w-full flex flex-col gap-2"></div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <div id="feedback-message" class="text-lg font-bold mb-4 min-h-[28px] transition-all duration-300"></div>
            <button onclick="resetActivity()" class="bg-[#413659] hover:bg-[#513873] text-white font-bold py-3 px-8 rounded-lg transition-colors shadow-md text-sm active:scale-95">
                Reset Activity
            </button>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let selectedCard = null;

        function init() {
            const pool = document.getElementById('scenarios-pool');
            pool.innerHTML = '';
            selectedCard = null;
            
            // Re-shuffling
            const shuffled = [...scenarios].sort(() => Math.random() - 0.5);

            shuffled.forEach(s => {
                const card = document.createElement('div');
                card.id = `card-${s.id}`;
                card.className = "scenario-card bg-white p-4 rounded-lg shadow-md border border-gray-200 text-center font-medium";
                card.draggable = true;
                card.innerText = s.text;
                card.dataset.category = s.category;
                
                // Mouse Events
                card.addEventListener('dragstart', dragStart);
                card.addEventListener('dragend', dragEnd);
                
                // Touch/Click Events
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleCardClick(card);
                });
                
                pool.appendChild(card);
            });

            document.querySelectorAll('.zone-content').forEach(z => z.innerHTML = '');
            document.getElementById('feedback-message').innerText = '';
        }

        function handleCardClick(card) {
            // If clicking the same card, deselect it
            if (selectedCard === card) {
                card.classList.remove('selected-card');
                selectedCard = null;
                return;
            }

            // If a different card was selected, clean it up
            if (selectedCard) {
                selectedCard.classList.remove('selected-card');
            }

            selectedCard = card;
            card.classList.add('selected-card');
            
            // Small vibration for mobile feedback if supported
            if (window.navigator.vibrate) window.navigator.vibrate(10);
        }

        // Handle clicking the drop zones
        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('click', () => {
                if (selectedCard) {
                    const zoneType = zone.id === 'zone-report' ? 'report' : 'no-report';
                    processDrop(selectedCard, zoneType);
                    selectedCard = null;
                }
            });
        });

        // Desktop Drag Functions
        function dragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.id);
            e.target.classList.add('dragging');
        }

        function dragEnd(e) {
            e.target.classList.remove('dragging');
        }

        function allowDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        }

        function dragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        function drop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            const cardId = e.dataTransfer.getData('text/plain');
            const card = document.getElementById(cardId);
            const zoneType = e.currentTarget.id === 'zone-report' ? 'report' : 'no-report';
            processDrop(card, zoneType);
        }

        function processDrop(card, zoneType) {
            const correctCategory = card.dataset.category;
            const targetZone = zoneType === 'report' ? document.getElementById('zone-report') : document.getElementById('zone-no-report');
            const zoneContent = targetZone.querySelector('.zone-content');

            // Remove selection styling
            card.classList.remove('selected-card');
            
            // Move card
            zoneContent.appendChild(card);
            card.draggable = false;
            card.onclick = null; // Disable clicks once placed
            card.className = "scenario-card p-2 rounded-lg border-2 text-center text-xs font-bold w-full mb-1 animate-pulse";

            if (zoneType === correctCategory) {
                card.classList.add('correct');
                showFeedback("Correct!", "text-green-600");
            } else {
                card.classList.add('incorrect');
                showFeedback("Not quite.", "text-red-600");
            }
            
            setTimeout(() => card.classList.remove('animate-pulse'), 500);
            checkCompletion();
        }

        function showFeedback(msg, colorClass) {
            const fb = document.getElementById('feedback-message');
            fb.innerText = msg;
            fb.className = `text-lg font-bold mb-4 min-h-[28px] ${colorClass} scale-110`;
            setTimeout(() => { 
                if (fb.innerText === msg) {
                    fb.innerText = ''; 
                    fb.className = "text-lg font-bold mb-4 min-h-[28px]";
                }
            }, 1200);
        }

        function checkCompletion() {
            const pool = document.getElementById('scenarios-pool');
            if (pool.children.length === 0) {
                const incorrect = document.querySelectorAll('.incorrect').length;
                const fb = document.getElementById('feedback-message');
                if (incorrect === 0) {
                    fb.innerText = "Excellent! You've correctly identified all scenarios.";
                    fb.className = "text-xl font-bold mb-4 text-[#513873]";
                } else {
                    fb.innerText = `Activity Complete! Score: ${scenarios.length - incorrect} / ${scenarios.length}`;
                    fb.className = "text-xl font-bold mb-4 text-[#413659]";
                }
            }
        }

        function resetActivity() { init(); }
        window.onload = init;
    </script>
</body>
</html>
