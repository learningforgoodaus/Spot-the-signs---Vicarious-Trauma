<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Report or Not?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #f6f5f8;
            color: #413659;
            overscroll-behavior-y: contain;
        }

        /* Target Zone Container */
        .drop-zone {
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            min-height: 180px;
            background: white;
        }

        /* MOBILE ONLY: Fixed height and scroll for category boxes */
        @media (max-width: 768px) {
            .zone-content {
                height: 180px; /* Fixed height for mobile */
                overflow-y: scroll !important; /* Force scrollbar */
                -webkit-overflow-scrolling: touch;
                padding: 5px;
                border: 1px inset #f0f0f0;
                border-radius: 8px;
            }
            
            #scenarios-pool {
                position: sticky;
                top: 0;
                z-index: 50;
                background: #f6f5f8;
                padding: 10px 0;
                display: flex;
                overflow-x: auto;
                gap: 10px;
                border-bottom: 2px solid #ddd;
            }

            .scenario-card {
                flex: 0 0 80%;
                min-width: 240px;
            }
        }

        /* Desktop view: Normal auto-height */
        @media (min-width: 769px) {
            .zone-content {
                min-height: 120px;
            }
        }

        /* Dropped Card: Compact & Contained */
        .dropped-card {
            margin: 2px 0 !important;
            padding: 6px 10px !important;
            font-size: 0.8rem !important;
            line-height: 1.2;
            width: 100% !important;
            box-sizing: border-box;
            word-wrap: break-word;
            overflow: hidden;
            display: block;
        }

        .scenario-card {
            cursor: grab;
            transition: transform 0.2s;
            user-select: none;
        }

        .selected-card {
            ring: 3px solid #513873;
            transform: scale(0.98);
            opacity: 0.8;
        }

        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .incorrect { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        
        /* Custom scrollbar for better visibility on mobile */
        .zone-content::-webkit-scrollbar { width: 6px; }
        .zone-content::-webkit-scrollbar-thumb { background: #C6B4D9; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-2xl font-bold text-[#513873]">Report or Not?</h1>
            <p class="text-xs text-[#413659] mt-1 italic">Tap card, then tap box.</p>
        </header>

        <div id="scenarios-pool" class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-6"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div id="zone-report" class="drop-zone border-4 border-dashed border-[#513873] rounded-2xl p-4 shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="bg-[#513873] text-white px-3 py-1 rounded-full text-[10px] font-bold mb-3 uppercase self-center">Report Required</div>
                <div class="zone-content w-full flex flex-col"></div>
            </div>

            <div id="zone-no-report" class="drop-zone border-4 border-dashed border-[#9C7F9D] rounded-2xl p-4 shadow-sm" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="bg-[#9C7F9D] text-white px-3 py-1 rounded-full text-[10px] font-bold mb-3 uppercase self-center">No Report Needed</div>
                <div class="zone-content w-full flex flex-col"></div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <div id="feedback-message" class="text-lg font-bold mb-4 min-h-[24px]"></div>
            <button onclick="resetActivity()" class="bg-[#413659] hover:bg-[#513873] text-white font-bold py-3 px-10 rounded-xl transition-all active:scale-95 shadow-md">
                Reset Activity
            </button>
        </div>
    </div>

    <script>
        const scenarios = [
            { id: 1, text: "A family member makes threats at the workplace counter.", category: "report" },
            { id: 2, text: "An employee asks for 10 days of paid domestic violence leave.", category: "report" },
            { id: 3, text: "Abusive text messages are sent to a work phone.", category: "report" },
            { id: 4, text: "A colleague says they are 'having a hard time' (no risks).", category: "no-report" },
            { id: 5, text: "You hear a rumour that someone is experiencing violence.", category: "no-report" },
            { id: 6, text: "Staff member talks about a past event that is resolved.", category: "no-report" }
        ];

        let selectedCard = null;

        function init() {
            const pool = document.getElementById('scenarios-pool');
            pool.innerHTML = '';
            selectedCard = null;
            [...scenarios].sort(() => Math.random() - 0.5).forEach(s => {
                const card = document.createElement('div');
                card.id = `card-${s.id}`;
                card.className = "scenario-card bg-white p-4 rounded-xl shadow-md border border-gray-200 text-center font-medium text-sm";
                card.draggable = true;
                card.innerText = s.text;
                card.dataset.category = s.category;
                
                card.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('text/plain', e.target.id);
                    e.target.classList.add('opacity-40');
                });

                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (selectedCard) selectedCard.classList.remove('selected-card');
                    if (selectedCard !== card) {
                        selectedCard = card;
                        card.classList.add('selected-card');
                    } else {
                        selectedCard = null;
                    }
                });
                pool.appendChild(card);
            });
            document.querySelectorAll('.zone-content').forEach(z => z.innerHTML = '');
            document.getElementById('feedback-message').innerText = '';
        }

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.addEventListener('click', () => {
                if (selectedCard) {
                    processMove(selectedCard, zone.id === 'zone-report' ? 'report' : 'no-report');
                    selectedCard = null;
                }
            });
        });

        function allowDrop(e) { e.preventDefault(); }
        function drop(e) {
            e.preventDefault();
            const cardId = e.dataTransfer.getData('text/plain');
            const targetZone = e.currentTarget.id === 'zone-report' ? 'report' : 'no-report';
            processMove(document.getElementById(cardId), targetZone);
        }

        function processMove(card, zoneType) {
            const targetZoneContent = document.getElementById(`zone-${zoneType}`).querySelector('.zone-content');
            card.classList.remove('selected-card', 'opacity-40', 'p-4', 'shadow-md', 'rounded-xl');
            
            // Apply compact dropped styling
            card.draggable = false;
            card.onclick = null;
            card.className = `dropped-card border-2 rounded-lg text-center font-bold ${card.dataset.category === zoneType ? 'correct' : 'incorrect'}`;
            
            targetZoneContent.appendChild(card);
            
            // Auto-scroll the box to show the latest drop
            targetZoneContent.scrollTop = targetZoneContent.scrollHeight;
            
            showFeedback(card.dataset.category === zoneType ? "Correct!" : "Incorrect.", card.dataset.category === zoneType ? "text-green-600" : "text-red-600");
            checkCompletion();
        }

        function showFeedback(msg, color) {
            const fb = document.getElementById('feedback-message');
            fb.innerText = msg;
            fb.className = `text-lg font-bold mb-4 ${color}`;
            setTimeout(() => { if (fb.innerText === msg) fb.innerText = ''; }, 1200);
        }

        function checkCompletion() {
            if (document.getElementById('scenarios-pool').children.length === 0) {
                const fb = document.getElementById('feedback-message');
                fb.className = "text-xl font-bold mb-4 text-[#513873]";
                fb.innerText = "Activity Complete!";
            }
        }

        window.onload = init;
        function resetActivity() { init(); }
    </script>
</body>
</html>
